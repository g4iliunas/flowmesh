name: FlowMesh 
on:
  push:
    branches:
      - main
jobs:
  build-flowmesh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libuv1 libuv1-dev cmake

      - name: Build FlowMesh server
        run: |
          cd ${{ github.workspace }}/flowmesh/server
          mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release ..
          make -j4 

      - name: Build FlowMesh client 
        run: |
          cd ${{ github.workspace }}/flowmesh/client
          mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release ..
          make -j4 